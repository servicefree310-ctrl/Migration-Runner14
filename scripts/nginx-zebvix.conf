# ============================================================================
# Zebvix — Nginx Reverse Proxy + Static File Config
#
# Installation on VPS:
#   sudo cp scripts/nginx-zebvix.conf /etc/nginx/sites-available/zebvix
#   sudo ln -sf /etc/nginx/sites-available/zebvix /etc/nginx/sites-enabled/zebvix
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (replace yourdomain.com first):
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# After SSL, re-run:
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# ── Upstream: API Server (PM2 cluster on port 8080) ──────────────────────────
upstream zebvix_api {
    least_conn;
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt / certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (certbot fills these in after: certbot --nginx) ──────────────────
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSL hardening (uncomment when certificate is present) ────────────────
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header X-XSS-Protection          "1; mode=block"                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # Uncomment after confirming HTTPS works:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/x-javascript text/xml application/xml
        application/xml+rss text/javascript image/svg+xml;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size 25M;

    # ── Root (User Portal — /user/) ───────────────────────────────────────────
    root /opt/zebvix/artifacts/user-portal/dist;
    index index.html;

    # ════════════════════════════════════════════════════════════════════════
    # /api  →  Express API server (Node/PM2)
    # ════════════════════════════════════════════════════════════════════════
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass         http://zebvix_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for streaming / SSE endpoints
        proxy_buffering    off;
        proxy_cache        off;
    }

    # Auth endpoints — stricter rate limiting
    location ~ ^/api/(auth|login|register|reset-password) {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass         http://zebvix_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket (price feeds, order book updates)
    location /api/ws {
        proxy_pass         http://zebvix_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ════════════════════════════════════════════════════════════════════════
    # /admin/  →  Admin Panel (static Vite build)
    # ════════════════════════════════════════════════════════════════════════
    location /admin/ {
        alias /opt/zebvix/artifacts/admin/dist/;

        # SPA fallback — all sub-routes serve index.html
        try_files $uri $uri/ /admin/index.html;

        # Cache static assets
        location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
            alias /opt/zebvix/artifacts/admin/dist/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ════════════════════════════════════════════════════════════════════════
    # /user/  →  User Trading Portal (static Vite build)
    # ════════════════════════════════════════════════════════════════════════
    location /user/ {
        alias /opt/zebvix/artifacts/user-portal/dist/;

        # SPA fallback
        try_files $uri $uri/ /user/index.html;

        # Cache static assets
        location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
            alias /opt/zebvix/artifacts/user-portal/dist/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ════════════════════════════════════════════════════════════════════════
    # /  →  Landing / redirect
    # ════════════════════════════════════════════════════════════════════════
    location / {
        # Redirect bare domain to user portal
        return 302 /user/;
    }

    # ── Health check (no auth, no rate limit) ────────────────────────────────
    location = /healthz {
        access_log off;
        proxy_pass http://zebvix_api/api/healthz;
    }

    # ── Block hidden files (.env, .git, etc.) ────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/zebvix-access.log combined buffer=16k flush=2s;
    error_log  /var/log/nginx/zebvix-error.log  warn;
}
